<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GB完全解析ツール</title>

<style>
body{
background:#111;
color:#0f0;
font-family:monospace;
}

.box{
border:1px solid #0f0;
margin:10px;
padding:10px;
}

textarea{
width:95%;
height:100px;
}

input,button{
margin:4px;
padding:4px;
}

pre{
white-space:pre-wrap;
}

#flags{
color:#0ff;
font-weight:bold;
}
</style>
</head>

<body>

<h1>GB完全解析ツール（フル版）</h1>

<!-- ================= HEX計算 ================= -->
<div class="box">
<h2>16進数計算</h2>

<input id="hex1" placeholder="A0">
<input id="hex2" placeholder="10">

<br>

<button onclick="calcAdd()">ADD (+)</button>
<button onclick="calcSub()">SUB (-)</button>

<p>
結果: <span id="hexResult"></span><br>
フラグ: <span id="flags"></span>
</p>

<h3>計算履歴</h3>
<div id="history"></div>

<button onclick="copyHistory()">履歴コピー</button>
</div>

<!-- ================= 文字変換 ================= -->
<div class="box">
<h2>文字 ⇄ HEX</h2>

<textarea id="text" placeholder="入力"></textarea><br>

<button onclick="textToHex()">文字 → HEX</button>
<button onclick="hexToText()">HEX → 文字</button>

<h3>HEX出力</h3>
<p id="hexOut"></p>

<h3>文字出力</h3>
<p id="textOut"></p>
</div>

<!-- ================= 逆アセンブル ================= -->
<div class="box">
<h2>逆アセンブル（簡易）</h2>

<textarea id="asmIn" placeholder="例: C3 00 10"></textarea><br>

<button onclick="disasm()">変換</button>

<pre id="asmOut"></pre>
</div>

<script>

//////////////////////////////////////////////////////
// フラグ管理
//////////////////////////////////////////////////////
function setFlags(Z,N,H,C){
let f=`Z:${Z} N:${N} H:${H} C:${C}`;
flags.textContent=f;
return f;
}

//////////////////////////////////////////////////////
// 履歴
//////////////////////////////////////////////////////
let hist=[];

function addHist(t){
hist.push(t);
history.innerHTML=hist.join("<br>");
}

function copyHistory(){
navigator.clipboard.writeText(hist.join("\n"));
}

//////////////////////////////////////////////////////
// 16進計算（ADD）
//////////////////////////////////////////////////////
function calcAdd(){

let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;

let r=a+b;
let res=r&0xFF;

setFlags(
res==0,
0,
((a&0xF)+(b&0xF))>0xF,
r>0xFF
);

hexResult.textContent=res.toString(16).toUpperCase();
addHist(`${hex1.value}+${hex2.value}=${res.toString(16)}`);
}

//////////////////////////////////////////////////////
// 16進計算（SUB）
//////////////////////////////////////////////////////
function calcSub(){

let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;

let r=a-b;
let res=r&0xFF;

setFlags(
res==0,
1,
(a&0xF)<(b&0xF),
a<b
);

hexResult.textContent=res.toString(16).toUpperCase();
addHist(`${hex1.value}-${hex2.value}=${res.toString(16)}`);
}

//////////////////////////////////////////////////////
// 文字テーブル（GB風）
//////////////////////////////////////////////////////
const table={
"50":"[END]","00":"-",

"80":"ア","81":"イ","82":"ウ","83":"エ","84":"オ",
"85":"カ","86":"キ","87":"ク","88":"ケ","89":"コ",
"8A":"サ","8B":"シ","8C":"ス","8D":"セ","8E":"ソ",
"8F":"タ","90":"チ","91":"ツ","92":"テ","93":"ト",
"94":"ナ","95":"ニ","96":"ヌ","97":"ネ","98":"ノ",
"99":"ハ","9A":"ヒ","9B":"フ","9C":"ホ",
"9D":"マ","9E":"ミ","9F":"ム","A0":"メ","A1":"モ",
"A2":"ヤ","A3":"ユ","A4":"ヨ",
"A5":"ラ","A6":"ル","A7":"レ","A8":"ロ",
"A9":"ワ","AA":"ヲ","AB":"ン",

"AC":"ッ","AD":"ャ","AE":"ュ","AF":"ョ",

"B0":"ァ","B1":"ィ","B2":"ゥ","B3":"ェ","B4":"ォ",

"B5":"あ","B6":"い","B7":"う","B8":"え","B9":"お",
"BA":"か","BB":"き","BC":"く","BD":"け","BE":"こ",
"BF":"さ","C0":"し","C1":"す","C2":"せ","C3":"そ",
"C4":"た","C5":"ち","C6":"つ","C7":"て","C8":"と",
"C9":"な","CA":"に","CB":"ぬ","CC":"ね","CD":"の",
"CE":"は","CF":"ひ","D0":"ふ","D1":"へ","D2":"ほ",
"D3":"ま","D4":"み","D5":"む","D6":"め","D7":"も",
"D8":"や","D9":"ゆ","DA":"よ",
"DB":"ら","DC":"り","DD":"る","DE":"れ","DF":"ろ",
"E0":"わ","E1":"を","E2":"ん",

"E3":"ー","E4":"゛","E5":"゜",
"E6":"？","E7":"！","E8":"。"
};

const rev={};
for(let k in table){
rev[table[k]]=k;
}

//////////////////////////////////////////////////////
// 正規化（①完全削除）
//////////////////////////////////////////////////////
function normalizeText(t){

let res="";

for(let i=0;i<t.length;i++){

let c=t[i];

// ★①〜⑳完全削除
if(/[①-⑳]/.test(c)) continue;

// 濁点
if(t[i+1]=="゛"){
res += (rev[c+"゛"]||c);
i++;
continue;
}

// 半濁点
if(t[i+1]=="゜"){
res += (rev[c+"゜"]||c);
i++;
continue;
}

res += c;
}

return res;
}

//////////////////////////////////////////////////////
// 文字 → HEX（5区切り + 50）
//////////////////////////////////////////////////////
function textToHex(){

let t=normalizeText(text.value);

let out=[];
let buf=[];

for(let ch of t){

let c=rev[ch];

if(!c){
alert("未定義文字: "+ch);
c="50";
}

buf.push(c);

if(buf.length===5){
out.push(...buf,"50");
buf=[];
}
}

if(buf.length){
while(buf.length<5)buf.push("50");
out.push(...buf,"50");
}

hexOut.textContent=out.join(" ");
}

//////////////////////////////////////////////////////
// HEX → 文字
//////////////////////////////////////////////////////
function hexToText(){

let arr=hexOut.textContent.trim().split(/\s+/);

let out="";

for(let h of arr){

if(h==="50") continue;

if(table[h]) out+=table[h];
else out+="�";
}

textOut.textContent=out;
}

//////////////////////////////////////////////////////
// 超簡易逆アセンブル
//////////////////////////////////////////////////////
const op={
"C3":"JP","CD":"CALL","C9":"RET",
"00":"NOP","3E":"LD A,imm"
};

function disasm(){

let arr=asmIn.value.trim().split(/\s+/);

let out=[];

for(let i=0;i<arr.length;i++){

let op1=arr[i].toUpperCase();

if(op[op1]){
out.push(op[op1]);
}else{
out.push("DB "+op1);
}
}

asmOut.textContent=out.join("\n");
}

</script>

</body>
</html>
