<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GB解析ツール</title>

<style>
body{
background:#111;
color:#0f0;
font-family:monospace;
}
.box{
border:1px solid #0f0;
margin:10px;
padding:10px;
}
textarea{
width:95%;
height:100px;
}
input,button,select{
margin:3px;
padding:4px;
}
#flags{
color:#0ff;
font-weight:bold;
}
</style>
</head>

<body>
<div class="box">
<h2>逆アセンブル</h2>

<textarea id="disInput" placeholder="例: 3E 10 06 20"></textarea><br>

開始アドレス:
<input id="startAddr" value="0000">

<button onclick="disassemble()">実行</button>

<pre id="disOut"></pre>
</div>
<h1>GB解析ツール</h1>

<!-- 計算 -->
<div class="box">
<h2>16bit計算（フラグ付き）</h2>

<input id="hex1" placeholder="A0">
<input id="hex2" placeholder="10"><br>

<button onclick="add()">+</button>
<button onclick="sub()">-</button>

<p>
結果: <span id="hexResult"></span><br>
フラグ: <span id="flags"></span>
</p>

<h3>履歴</h3>
<div id="history"></div>
<button onclick="copyHistory()">コピー</button>
</div>

<!-- 進数 -->
<div class="box">
<h2>進数変換</h2>

<input id="num">
<select id="base">
<option value="10">10</option>
<option value="16">16</option>
<option value="2">2</option>
</select>

<button onclick="convert()">変換</button>

<p id="out10"></p>
<p id="out16"></p>
<p id="out2"></p>
</div>

<!-- 論理演算 -->
<div class="box">
<h2>論理演算</h2>

<input id="l1">
<input id="l2"><br>

<button onclick="andOp()">AND</button>
<button onclick="orOp()">OR</button>
<button onclick="xorOp()">XOR</button>

<p id="logicOut"></p>
</div>

<!-- 文字変換 -->
<div class="box">
<h2>GB文字変換</h2>

<textarea id="hexText"></textarea><br>
<button onclick="hexToText()">HEX→文字</button>

<br><br>

<textarea id="text"></textarea><br>
<button onclick="textToHex()">文字→HEX</button>

<p id="textOut"></p>
<p id="hexOut"></p>
</div>

<script>

// フラグ
function setFlags(Z,N,H,C){
flags.textContent=`Z:${Z} N:${N} H:${H} C:${C}`;
return {Z,N,H,C};
}

// 履歴
let hist=[];
function addHist(t){
hist.push(t);
history.innerHTML=hist.join("<br>");
}
function copyHistory(){
navigator.clipboard.writeText(hist.join("\n"));
}

// 計算
function add(){
let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;
let r=a+b;
let w=r&0xFF;

let f=setFlags(w==0,0,((a&0xF)+(b&0xF)>0xF),r>0xFF);

hexResult.textContent=w.toString(16).toUpperCase();
addHist(`${hex1.value}+${hex2.value}=${w.toString(16)}`);
}

function sub(){
let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;
let r=a-b;
let w=r&0xFF;

let f=setFlags(w==0,1,(a&0xF)<(b&0xF),a<b);

hexResult.textContent=w.toString(16).toUpperCase();
addHist(`${hex1.value}-${hex2.value}=${w.toString(16)}`);
}

// 進数変換
function convert(){
let v=parseInt(num.value,parseInt(base.value))||0;
out10.textContent="10:"+v;
out16.textContent="16:"+v.toString(16).toUpperCase();
out2.textContent="2:"+v.toString(2);
}

// 論理演算
function andOp(){
logicOut.textContent=(parseInt(l1.value,16)&parseInt(l2.value,16)).toString(16);
}
function orOp(){
logicOut.textContent=(parseInt(l1.value,16)|parseInt(l2.value,16)).toString(16);
}
function xorOp(){
logicOut.textContent=(parseInt(l1.value,16)^parseInt(l2.value,16)).toString(16);
}

// 文字テーブル（そのまま）
const table={
"00":"-","01":"イ゛","02":"ウ゛","03":"エ゛","04":"オ゛",

"05":"ガ","06":"ギ","07":"グ","08":"ゲ","09":"ゴ",
"0A":"ザ","0B":"ジ","0C":"ズ","0D":"ゼ","0E":"ゾ",

"0F":"ダ","10":"ヂ","11":"ヅ","12":"デ","13":"ド",

"14":"ナ゛","15":"ニ゛","16":"ヌ゛","17":"ネ゛","18":"ノ゛",

"19":"バ","1A":"ビ","1B":"ブ","1C":"ボ",

"1D":"マ゛","1E":"ミ゛","1F":"ム゛",

"20":"ィ゛","21":"あ゛","22":"い゛","23":"?","24":"え゛","25":"お゛",

"26":"が","27":"ぎ","28":"ぐ","29":"げ","2A":"ご",
"2B":"ざ","2C":"じ","2D":"ず","2E":"ぜ","2F":"ぞ",

"30":"だ","31":"ぢ","32":"づ","33":"で","34":"ど",

"35":"な゛","36":"に゛","37":"ぬ゛","38":"ね゛","39":"の゛",

"3A":"ば","3B":"び","3C":"ぶ","3D":"べ","3E":"ぼ",

"3F":"ま゛","40":"パ","41":"ピ","42":"プ","43":"ポ",

"44":"ぱ","45":"ぴ","46":"ぷ","47":"ぺ","48":"ぽ",

"49":"ま゜","4A":"み゜",

"4B":"[送]","4C":"[自動]","4D":"も゜",

"4E":"\n","4F":"\n","50":"終",

"60":"A","61":"B","62":"C",
"7F":"空",

"80":"ア","81":"イ","82":"ウ","83":"エ","84":"オ",
"85":"カ","86":"キ","87":"ク","88":"ケ","89":"コ",
"8A":"サ","8B":"シ","8C":"ス","8D":"セ","8E":"ソ",

"8F":"タ","90":"チ","91":"ツ","92":"テ","93":"ト",

"94":"ナ","95":"ニ","96":"ヌ","97":"ネ","98":"ノ",
"99":"ハ","9A":"ヒ","9B":"フ","9C":"ホ",

"9D":"マ","9E":"ミ","9F":"ム","A0":"メ","A1":"モ",

"A2":"ヤ","A3":"ユ","A4":"ヨ",
"A5":"ラ","A6":"ル","A7":"レ","A8":"ロ",

"A9":"ワ","AA":"ヲ","AB":"ン",

"AC":"ッ","AD":"ャ","AE":"ュ","AF":"ョ",

"B0":"ィ","B1":"あ","B2":"い","B3":"う","B4":"え","B5":"お",

"B6":"か","B7":"き","B8":"く","B9":"け","BA":"こ",

"BB":"さ","BC":"し","BD":"す","BE":"せ","BF":"そ",

"C0":"た","C1":"ち","C2":"つ","C3":"て","C4":"と",

"C5":"な","C6":"に","C7":"ぬ","C8":"ね","C9":"の",

"CA":"は","CB":"ひ","CC":"ふ","CD":"へ","CE":"ほ",

"CF":"ま","D0":"み","D1":"む","D2":"め","D3":"も",

"D4":"や","D5":"ゆ","D6":"よ",

"D7":"ら","D8":"り","D9":"る","DA":"れ","DB":"ろ",

"DC":"わ","DD":"を","DE":"ん",

"DF":"っ","E0":"ゃ","E1":"ゅ","E2":"ょ",

"E3":"ー","E4":"ﾟ","E5":"゛",

"E6":"？","E7":"！","E8":"。",
"E9":"ァ","EA":"ゥ","EB":"ェ","EC":"ォ",

"ED":"[改行]","EE":"[改頁]","EF":"▼",

"F0":"円","F1":"×","F2":"．","F3":"／",

"F4":"♂","F5":"♀",

"F6":"0","F7":"1","F8":"2","F9":"3",
"FA":"4","FB":"5","FC":"6","FD":"7","FE":"8","FF":"9"
};
// reverse
const rev={};
for(let k in table){
let v=table[k];
if(v.startsWith("[") || v=="\n") continue;
rev[v]=k;
}

// HEX→文字
function hexToText(){
let c=hexText.value.replace(/[^0-9A-F]/gi,"");
let r="";
for(let i=0;i<c.length;i+=2){
let h=c.substr(i,2).toUpperCase();
r+=table[h]||"?";
}
textOut.textContent=r;
}

// 文字→HEX
function textToHex(){
let t=text.value;
let out=[];
for(let i=0;i<t.length;i++){
let c=rev[t[i]]||"50";
out.push(c);
}
hexOut.textContent=out.join(" ");
}
// ===== 逆アセンブル用 =====

// 命令テーブル
const OPCODES = {
  0x00:{m:"NOP",s:1},

  0x3E:{m:"LD A,d8",s:2},
  0x06:{m:"LD B,d8",s:2},
  0x0E:{m:"LD C,d8",s:2},

  0xAF:{m:"XOR A",s:1},

  0x32:{m:"LDD (HL),A",s:1},

  0xCD:{m:"CALL a16",s:3},
  0xC3:{m:"JP a16",s:3},

  0x18:{m:"JR r8",s:2},
  0x20:{m:"JR NZ,r8",s:2},
  0x28:{m:"JR Z,r8",s:2},

  0xE0:{m:"LDH (a8),A",s:2},
  0xF0:{m:"LDH A,(a8)",s:2},

  0xCB:{m:"PREFIX CB",s:1}
};

// CB命令
const OPCODES_CB = {
  0x11:"RL C",
  0x7C:"BIT 7,H",
  0x37:"SWAP A"
};

// hex表示
function hex(v,d){
return v.toString(16).toUpperCase().padStart(d,"0");
}

// 逆アセンブル本体
function disassemble(){

let raw = disInput.value.replace(/[^0-9A-F]/gi,"");
let bytes=[];
for(let i=0;i<raw.length;i+=2){
  bytes.push(parseInt(raw.substr(i,2),16));
}

let start = parseInt(startAddr.value,16)||0;

// ===== 1パス目：ジャンプ先収集 =====
let labels={};
let pc=start;
let i=0;

while(i<bytes.length){
  let op=bytes[i];

  if(op===0x18||op===0x20||op===0x28){
    let offset = (bytes[i+1]<<24)>>24;
    let target = pc + 2 + offset;
    labels[target]=true;
    i+=2; pc+=2;
    continue;
  }

  if(op===0xC3||op===0xCD){
    let lo=bytes[i+1];
    let hi=bytes[i+2];
    let addr=(hi<<8)|lo;
    labels[addr]=true;
    i+=3; pc+=3;
    continue;
  }

  let def=OPCODES[op];
  let size=def?def.s:1;
  i+=size;
  pc+=size;
}

// ラベル名生成
let labelNames={};
let id=0;
for(let addr in labels){
  labelNames[addr]="L"+hex(id++,4);
}

// ===== 2パス目 =====
pc=start;
i=0;
let out=[];

while(i<bytes.length){

  if(labelNames[pc]){
    out.push(labelNames[pc]+":");
  }

  let op=bytes[i];

  if(op===0xCB){
    let cb=bytes[i+1];
    let name=OPCODES_CB[cb]||"???";
    out.push(`${hex(pc,4)}: CB ${hex(cb,2)}  ${name}`);
    i+=2; pc+=2;
    continue;
  }

  let def=OPCODES[op];

  if(!def){
    out.push(`${hex(pc,4)}: ${hex(op,2)}  ???`);
    i+=1; pc+=1;
    continue;
  }

  let inst = bytes.slice(i,i+def.s);
  let text = def.m;

  if(def.s===2){
    let d=inst[1];

    if(text.includes("r8")){
      let offset = (d<<24)>>24;
      let target = pc + 2 + offset;
      text = text.replace("r8", labelNames[target]||hex(target,4));
    }else{
      text = text.replace("d8",hex(d,2))
                 .replace("a8",hex(d,2));
    }
  }

  if(def.s===3){
    let lo=inst[1];
    let hi=inst[2];
    let addr=(hi<<8)|lo;
    text = text.replace("a16",labelNames[addr]||hex(addr,4));
  }

  out.push(`${hex(pc,4)}: ${inst.map(b=>hex(b,2)).join(" ")}  ${text}`);

  i+=def.s;
  pc+=def.s;
}

disOut.textContent=out.join("\n");
}
</script>

</body>
</html>
