<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GBи§Јжһҗгғ„гғјгғ«</title>

<style>
body{
background:#111;
color:#0f0;
font-family:monospace;
}
.box{
border:1px solid #0f0;
margin:10px;
padding:10px;
}
textarea{
width:95%;
height:100px;
}
input,button,select{
margin:3px;
padding:4px;
}
#flags{
color:#0ff;
font-weight:bold;
}
</style>
</head>

<body>
<div class="box">
<h2>йҖҶгӮўгӮ»гғігғ–гғ«</h2>

<textarea id="disInput" placeholder="дҫӢ: 3E 10 06 20"></textarea><br>

й–Ӣе§ӢгӮўгғүгғ¬гӮ№:
<input id="startAddr" value="0000">

<button onclick="disassemble()">е®ҹиЎҢ</button>

<pre id="disOut"></pre>
</div>
<h1>GBи§Јжһҗгғ„гғјгғ«</h1>

<!-- иЁҲз®— -->
<div class="box">
<h2>16bitиЁҲз®—пјҲгғ•гғ©гӮ°д»ҳгҒҚпјү</h2>

<input id="hex1" placeholder="A0">
<input id="hex2" placeholder="10"><br>

<button onclick="add()">+</button>
<button onclick="sub()">-</button>

<p>
зөҗжһң: <span id="hexResult"></span><br>
гғ•гғ©гӮ°: <span id="flags"></span>
</p>

<h3>еұҘжӯҙ</h3>
<div id="history"></div>
<button onclick="copyHistory()">гӮігғ”гғј</button>
</div>

<!-- йҖІж•° -->
<div class="box">
<h2>йҖІж•°еӨүжҸӣ</h2>

<input id="num">
<select id="base">
<option value="10">10</option>
<option value="16">16</option>
<option value="2">2</option>
</select>

<button onclick="convert()">еӨүжҸӣ</button>

<p id="out10"></p>
<p id="out16"></p>
<p id="out2"></p>
</div>

<!-- и«–зҗҶжј”з®— -->
<div class="box">
<h2>и«–зҗҶжј”з®—</h2>

<input id="l1">
<input id="l2"><br>

<button onclick="andOp()">AND</button>
<button onclick="orOp()">OR</button>
<button onclick="xorOp()">XOR</button>

<p id="logicOut"></p>
</div>

<!-- ж–Үеӯ—еӨүжҸӣ -->
<div class="box">
<h2>GBж–Үеӯ—еӨүжҸӣ</h2>

<textarea id="hexText"></textarea><br>
<button onclick="hexToText()">HEXвҶ’ж–Үеӯ—</button>

<br><br>

<textarea id="text"></textarea><br>
<button onclick="textToHex()">ж–Үеӯ—вҶ’HEX</button>

<p id="textOut"></p>
<p id="hexOut"></p>
</div>

<script>

// гғ•гғ©гӮ°
function setFlags(Z,N,H,C){
flags.textContent=`Z:${Z} N:${N} H:${H} C:${C}`;
return {Z,N,H,C};
}

// еұҘжӯҙ
let hist=[];
function addHist(t){
hist.push(t);
history.innerHTML=hist.join("<br>");
}
function copyHistory(){
navigator.clipboard.writeText(hist.join("\n"));
}

// иЁҲз®—
function add(){
let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;
let r=a+b;
let w=r&0xFF;

let f=setFlags(w==0,0,((a&0xF)+(b&0xF)>0xF),r>0xFF);

hexResult.textContent=w.toString(16).toUpperCase();
addHist(`${hex1.value}+${hex2.value}=${w.toString(16)}`);
}

function sub(){
let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;
let r=a-b;
let w=r&0xFF;

let f=setFlags(w==0,1,(a&0xF)<(b&0xF),a<b);

hexResult.textContent=w.toString(16).toUpperCase();
addHist(`${hex1.value}-${hex2.value}=${w.toString(16)}`);
}

// йҖІж•°еӨүжҸӣ
function convert(){
let v=parseInt(num.value,parseInt(base.value))||0;
out10.textContent="10:"+v;
out16.textContent="16:"+v.toString(16).toUpperCase();
out2.textContent="2:"+v.toString(2);
}

// и«–зҗҶжј”з®—
function andOp(){
logicOut.textContent=(parseInt(l1.value,16)&parseInt(l2.value,16)).toString(16);
}
function orOp(){
logicOut.textContent=(parseInt(l1.value,16)|parseInt(l2.value,16)).toString(16);
}
function xorOp(){
logicOut.textContent=(parseInt(l1.value,16)^parseInt(l2.value,16)).toString(16);
}

// ж–Үеӯ—гғҶгғјгғ–гғ«пјҲгҒқгҒ®гҒҫгҒҫпјү
const table={
"00":"-","01":"гӮӨгӮӣ","02":"гӮҰгӮӣ","03":"гӮЁгӮӣ","04":"гӮӘгӮӣ",

"05":"гӮ¬","06":"гӮ®","07":"гӮ°","08":"гӮІ","09":"гӮҙ",
"0A":"гӮ¶","0B":"гӮё","0C":"гӮә","0D":"гӮј","0E":"гӮҫ",

"0F":"гғҖ","10":"гғӮ","11":"гғ…","12":"гғҮ","13":"гғү",

"14":"гғҠгӮӣ","15":"гғӢгӮӣ","16":"гғҢгӮӣ","17":"гғҚгӮӣ","18":"гғҺгӮӣ",

"19":"гғҗ","1A":"гғ“","1B":"гғ–","1C":"гғң",

"1D":"гғһгӮӣ","1E":"гғҹгӮӣ","1F":"гғ гӮӣ",

"20":"гӮЈгӮӣ","21":"гҒӮгӮӣ","22":"гҒ„гӮӣ","23":"?","24":"гҒҲгӮӣ","25":"гҒҠгӮӣ",

"26":"гҒҢ","27":"гҒҺ","28":"гҒҗ","29":"гҒ’","2A":"гҒ”",
"2B":"гҒ–","2C":"гҒҳ","2D":"гҒҡ","2E":"гҒң","2F":"гҒһ",

"30":"гҒ ","31":"гҒў","32":"гҒҘ","33":"гҒ§","34":"гҒ©",

"35":"гҒӘгӮӣ","36":"гҒ«гӮӣ","37":"гҒ¬гӮӣ","38":"гҒӯгӮӣ","39":"гҒ®гӮӣ",

"3A":"гҒ°","3B":"гҒі","3C":"гҒ¶","3D":"гҒ№","3E":"гҒј",

"3F":"гҒҫгӮӣ","40":"гғ‘","41":"гғ”","42":"гғ—","43":"гғқ",

"44":"гҒұ","45":"гҒҙ","46":"гҒ·","47":"гҒә","48":"гҒҪ",

"49":"гҒҫгӮң","4A":"гҒҝгӮң",

"4B":"[йҖҒ]","4C":"[иҮӘеӢ•]","4D":"гӮӮгӮң",

"4E":"\n","4F":"\n","50":"зөӮ",

"60":"A","61":"B","62":"C",
"7F":"з©ә",

"80":"гӮў","81":"гӮӨ","82":"гӮҰ","83":"гӮЁ","84":"гӮӘ",
"85":"гӮ«","86":"гӮӯ","87":"гӮҜ","88":"гӮұ","89":"гӮі",
"8A":"гӮө","8B":"гӮ·","8C":"гӮ№","8D":"гӮ»","8E":"гӮҪ",

"8F":"гӮҝ","90":"гғҒ","91":"гғ„","92":"гғҶ","93":"гғҲ",

"94":"гғҠ","95":"гғӢ","96":"гғҢ","97":"гғҚ","98":"гғҺ",
"99":"гғҸ","9A":"гғ’","9B":"гғ•","9C":"гғӣ",

"9D":"гғһ","9E":"гғҹ","9F":"гғ ","A0":"гғЎ","A1":"гғў",

"A2":"гғӨ","A3":"гғҰ","A4":"гғЁ",
"A5":"гғ©","A6":"гғ«","A7":"гғ¬","A8":"гғӯ",

"A9":"гғҜ","AA":"гғІ","AB":"гғі",

"AC":"гғғ","AD":"гғЈ","AE":"гғҘ","AF":"гғ§",

"B0":"гӮЈ","B1":"гҒӮ","B2":"гҒ„","B3":"гҒҶ","B4":"гҒҲ","B5":"гҒҠ",

"B6":"гҒӢ","B7":"гҒҚ","B8":"гҒҸ","B9":"гҒ‘","BA":"гҒ“",

"BB":"гҒ•","BC":"гҒ—","BD":"гҒҷ","BE":"гҒӣ","BF":"гҒқ",

"C0":"гҒҹ","C1":"гҒЎ","C2":"гҒӨ","C3":"гҒҰ","C4":"гҒЁ",

"C5":"гҒӘ","C6":"гҒ«","C7":"гҒ¬","C8":"гҒӯ","C9":"гҒ®",

"CA":"гҒҜ","CB":"гҒІ","CC":"гҒө","CD":"гҒё","CE":"гҒ»",

"CF":"гҒҫ","D0":"гҒҝ","D1":"гӮҖ","D2":"гӮҒ","D3":"гӮӮ",

"D4":"гӮ„","D5":"гӮҶ","D6":"гӮҲ",

"D7":"гӮү","D8":"гӮҠ","D9":"гӮӢ","DA":"гӮҢ","DB":"гӮҚ",

"DC":"гӮҸ","DD":"гӮ’","DE":"гӮ“",

"DF":"гҒЈ","E0":"гӮғ","E1":"гӮ…","E2":"гӮҮ",

"E3":"гғј","E4":"пҫҹ","E5":"гӮӣ",

"E6":"пјҹ","E7":"пјҒ","E8":"гҖӮ",
"E9":"гӮЎ","EA":"гӮҘ","EB":"гӮ§","EC":"гӮ©",

"ED":"[ж”№иЎҢ]","EE":"[ж”№й Ғ]","EF":"в–ј",

"F0":"еҶҶ","F1":"Г—","F2":"пјҺ","F3":"пјҸ",

"F4":"вҷӮ","F5":"вҷҖ",

"F6":"0","F7":"1","F8":"2","F9":"3",
"FA":"4","FB":"5","FC":"6","FD":"7","FE":"8","FF":"9"
};
// reverse
const rev={};
for(let k in table){
let v=table[k];
if(v.startsWith("[") || v=="\n") continue;
rev[v]=k;
}

// HEXвҶ’ж–Үеӯ—
function hexToText(){
let c=hexText.value.replace(/[^0-9A-F]/gi,"");
let r="";
for(let i=0;i<c.length;i+=2){
let h=c.substr(i,2).toUpperCase();
r+=table[h]||"?";
}
textOut.textContent=r;
}

// ж–Үеӯ—вҶ’HEX
function textToHex(){
let t=text.value;
let out=[];
for(let i=0;i<t.length;i++){
let c=rev[t[i]]||"50";
out.push(c);
}
hexOut.textContent=out.join(" ");
}
// ===== йҖҶгӮўгӮ»гғігғ–гғ«з”Ё =====

// е‘Ҫд»ӨгғҶгғјгғ–гғ«
const OPCODES = {
  0x00:{m:"NOP",s:1},

  0x3E:{m:"LD A,d8",s:2},
  0x06:{m:"LD B,d8",s:2},
  0x0E:{m:"LD C,d8",s:2}, 
  0x26:{m:"LD H,d8",s:2},
  0x2E:{m:"LD I,d8",s:2},

  0xAF:{m:"XOR A",s:1},

  0x32:{m:"LDD (HL),A",s:1},

  0xCD:{m:"CALL a16",s:3},
  0xC3:{m:"JP a16",s:3},

  0x18:{m:"JR r8",s:2},
  0x20:{m:"JR NZ,r8",s:2},
  0x28:{m:"JR Z,r8",s:2},

  0xE0:{m:"LDH (a8),A",s:2},
  0xF0:{m:"LDH A,(a8)",s:2},

  0xCB:{m:"PREFIX CB",s:1}
};

// CBе‘Ҫд»Ө
const OPCODES_CB = {
  0x11:"RL C",
  0x7C:"BIT 7,H",
  0x37:"SWAP A"
};

// hexиЎЁзӨә
function hex(v,d){
return v.toString(16).toUpperCase().padStart(d,"0");
}

// йҖҶгӮўгӮ»гғігғ–гғ«жң¬дҪ“
function disassemble(){

let raw = disInput.value.replace(/[^0-9A-F]/gi,"");
let bytes=[];
for(let i=0;i<raw.length;i+=2){
  bytes.push(parseInt(raw.substr(i,2),16));
}

let start = parseInt(startAddr.value,16)||0;

// ===== 1гғ‘гӮ№зӣ®пјҡгӮёгғЈгғігғ—е…ҲеҸҺйӣҶ =====
let labels={};
let pc=start;
let i=0;

while(i<bytes.length){
  let op=bytes[i];

  if(op===0x18||op===0x20||op===0x28){
    let offset = (bytes[i+1]<<24)>>24;
    let target = pc + 2 + offset;
    labels[target]=true;
    i+=2; pc+=2;
    continue;
  }

  if(op===0xC3||op===0xCD){
    let lo=bytes[i+1];
    let hi=bytes[i+2];
    let addr=(hi<<8)|lo;
    labels[addr]=true;
    i+=3; pc+=3;
    continue;
  }

  let def=OPCODES[op];
  let size=def?def.s:1;
  i+=size;
  pc+=size;
}

// гғ©гғҷгғ«еҗҚз”ҹжҲҗ
let labelNames={};
let id=0;
for(let addr in labels){
  let a = parseInt(addr);
  labelNames[a] = hex(a,4);
}
// ===== 2гғ‘гӮ№зӣ® =====
pc=start;
i=0;
let out=[];

while(i<bytes.length){

  if(labelNames[pc]){
    out.push(labelNames[pc]+":");
  }

  let op=bytes[i];

  if(op===0xCB){
    let cb=bytes[i+1];
    let name=OPCODES_CB[cb]||"???";
    out.push(`${hex(pc,4)}: CB ${hex(cb,2)}  ${name}`);
    i+=2; pc+=2;
    continue;
  }

  let def=OPCODES[op];

  if(!def){
    out.push(`${hex(pc,4)}: ${hex(op,2)}  ???`);
    i+=1; pc+=1;
    continue;
  }

  let inst = bytes.slice(i,i+def.s);
  let text = def.m;

  if(def.s===2){
  let d=inst[1];

  if(text.includes("r8")){
    let offset = d < 0x80 ? d : d - 0x100; // вҶҗгҒ“гҒЈгҒЎгҒ®ж–№гҒҢе®үе®ҡ
    let target = (pc + 2 + offset) & 0xFFFF;

    let label = labelNames[target] || hex(target,4);
    text = text.replace("r8", label);

  }else{
    text = text.replace("d8",hex(d,2))
               .replace("a8",hex(d,2));
  }
}
  if(def.s===3){
    let lo=inst[1];
    let hi=inst[2];
    let addr=(hi<<8)|lo;
    text = text.replace("a16",labelNames[addr]||hex(addr,4));
  }

  out.push(`${hex(pc,4)}: ${inst.map(b=>hex(b,2)).join(" ")}  ${text}`);

  i+=def.s;
  pc+=def.s;
}

disOut.textContent=out.join("\n");
}
</script>

</body>
</html>
