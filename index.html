<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GB解析ツール 完全版</title>

<style>
body{background:#111;color:#0f0;font-family:monospace;text-align:center;}
.box{border:1px solid #0f0;margin:15px;padding:10px;}
textarea{width:90%;height:100px;}
input,button,select{margin:5px;padding:5px;}
pre{text-align:left;}
</style>
</head>

<body>

<h1>GB解析ツール 完全版</h1>

<!-- 計算 -->
<div class="box">
<h2>16進計算（GB仕様）</h2>
<input id="hex1"><input id="hex2"><br>
<button onclick="add()">+</button>
<button onclick="sub()">-</button>
<p id="hexResult"></p>
<p id="flags"></p>
</div>

<!-- 論理 -->
<div class="box">
<h2>論理演算</h2>
<input id="logic1"><input id="logic2"><br>
<button onclick="andOp()">AND</button>
<button onclick="orOp()">OR</button>
<button onclick="xorOp()">XOR</button>
<p id="logicResult"></p>
</div>

<!-- 進数 -->
<div class="box">
<h2>進数変換</h2>
<input id="inputValue">
<select id="base">
<option value="10">10</option>
<option value="16">16</option>
<option value="2">2</option>
</select><br>
<button onclick="convert()">変換</button>
<p id="bin"></p><p id="dec"></p><p id="hex"></p>
</div>

<!-- 文字 -->
<div class="box">
<h2>GB文字変換</h2>

<textarea id="hexInput"></textarea><br>
<button onclick="hexToText()">HEX→文字</button>
<button onclick="copyText()">コピー</button>

<br><br>

<textarea id="textInput"></textarea><br>
<button onclick="textToHex()">文字→HEX（5文字50）</button>
<button onclick="copyHex()">コピー</button>

<p id="textResult"></p>
<p id="hexResult2"></p>
</div>

<!-- 逆アセンブラ -->
<div class="box">
<h2>逆アセンブラ</h2>

開始アドレス: <input id="startAddr" placeholder="4000"><br>

<textarea id="asmInput"></textarea><br>
<button onclick="disasm()">逆アセンブル</button>
<button onclick="copyAsm()">コピー</button>

<pre id="asmResult"></pre>
</div>

<script>
// ===== 共通 =====
function wrap(v){return v&0xFF;}
function setFlags(Z,N,H,C){
flags.textContent=`Z:${Z} N:${N} H:${H} C:${C}`;
}

// ===== 計算 =====
function add(){
let a=parseInt(hex1.value,16),b=parseInt(hex2.value,16);
let r=a+b;
setFlags((r&0xFF)==0?1:0,0,((a&0xF)+(b&0xF)>0xF)?1:0,r>0xFF?1:0);
hexResult.textContent=wrap(r).toString(16).toUpperCase();
}
function sub(){
let a=parseInt(hex1.value,16),b=parseInt(hex2.value,16);
let r=a-b,w=r&0xFF;
setFlags(w===0?1:0,1,(a&0xF)<(b&0xF)?1:0,a<b?1:0);
hexResult.textContent=w.toString(16).toUpperCase();
}

// ===== 論理 =====
function andOp(){logicResult.textContent=(parseInt(logic1.value,16)&parseInt(logic2.value,16)).toString(16);}
function orOp(){logicResult.textContent=(parseInt(logic1.value,16)|parseInt(logic2.value,16)).toString(16);}
function xorOp(){logicResult.textContent=(parseInt(logic1.value,16)^parseInt(logic2.value,16)).toString(16);}

// ===== 進数 =====
function convert(){
let v=parseInt(inputValue.value,Number(base.value));
bin.textContent=v.toString(2);
dec.textContent=v;
hex.textContent=v.toString(16).toUpperCase();
}

// ===== フル文字テーブル（完全）=====
const table = {
"80":"ア","81":"イ","82":"ウ","83":"エ","84":"オ","85":"カ","86":"キ","87":"ク","88":"ケ","89":"コ",
"8A":"サ","8B":"シ","8C":"ス","8D":"セ","8E":"ソ","8F":"タ","90":"チ","91":"ツ","92":"テ","93":"ト",
"94":"ナ","95":"ニ","96":"ヌ","97":"ネ","98":"ノ","99":"ハ","9A":"ヒ","9B":"フ","9C":"ホ",
"9D":"マ","9E":"ミ","9F":"ム","A0":"メ","A1":"モ","A2":"ヤ","A3":"ユ","A4":"ヨ",
"A5":"ラ","A6":"ル","A7":"レ","A8":"ロ","A9":"ワ","AA":"ヲ","AB":"ン","AC":"ッ","AD":"ャ","AE":"ュ","AF":"ョ",
"B0":"ィ","B1":"あ","B2":"い","B3":"う","B4":"え","B5":"お","B6":"か","B7":"き","B8":"く","B9":"け","BA":"こ",
"BB":"さ","BC":"し","BD":"す","BE":"せ","BF":"そ",
"C0":"た","C1":"ち","C2":"つ","C3":"て","C4":"と","C5":"な","C6":"に","C7":"ぬ","C8":"ね","C9":"の",
"CA":"は","CB":"ひ","CC":"ふ","CD":"へ","CE":"ほ",
"D0":"み","D1":"む","D2":"め","D3":"も","D4":"や","D5":"ゆ","D6":"よ",
"4F":"\n","50":"[終]"
};

const reverse={};
for(let k in table){if(!table[k].startsWith("["))reverse[table[k]]=k;}

function hexToText(){
let c=hexInput.value.replace(/[^0-9A-F]/gi,"");
let r="";
for(let i=0;i<c.length;i+=2){
let b=c.substr(i,2).toUpperCase();
r+=table[b]||"["+b+"]";
}
textResult.textContent=r;
}

function textToHex(){
let input=textInput.value.replace(/[①-⑳]/g,"");
let lines=input.split("\n");
let res=[];
for(let line of lines){
let block=[];
for(let ch of line){
let code=reverse[ch]||"??";
block.push(code);
if(block.length===5){
res.push(...block,"50");
block=[];
}
}
if(block.length>0){
while(block.length<5)block.push("50");
res.push(...block,"50");
}
}
hexResult2.textContent=res.join(" ");
}

// ===== コピー =====
function copyHex(){navigator.clipboard.writeText(hexResult2.textContent);}
function copyText(){navigator.clipboard.writeText(textResult.textContent);}

// ===== 逆アセンブラ =====
const opcodes={
"00":["nop",0],"3E":["ld a,xx",1],"06":["ld b,xx",1],
"18":["jr +xx",1],"20":["jr nz,+xx",1],"28":["jr z,+xx",1],
"C3":["jp yyxx",2],"CD":["call yyxx",2],"C9":["ret",0]
};

function disasm(){
let bytes=asmInput.value.replace(/[^0-9A-F]/gi,"").toUpperCase();
let addr=parseInt(startAddr.value,16)||0;
let i=0,res="";
while(i<bytes.length){
let op=bytes.substr(i,2);
let info=opcodes[op];
if(!info){res+=addr.toString(16).padStart(4,"0")+": "+op+" ???\n";i+=2;addr++;continue;}
let [name,len]=info;
let raw=op,args=[];
for(let j=1;j<=len;j++){let b=bytes.substr(i+2*j,2);raw+=" "+b;args.push(b);}
let line=name;
if(name.includes("xx")) line=line.replace("xx",args[0]);
if(name.includes("yyxx")) line=line.replace("yyxx",args[1]+args[0]);

let jump="";
if(name.includes("jr")){
let off=parseInt(args[0],16);
if(off>=0x80) off-=0x100;
let target=(addr+(len+1)+off)&0xFFFF;
jump=" -> "+target.toString(16).toUpperCase().padStart(4,"0");
}

res+=addr.toString(16).padStart(4,"0")+": "+raw.padEnd(10)+" "+line+jump+"\n";
i+=2*(len+1);
addr+=(len+1);
}
asmResult.textContent=res;
}

function copyAsm(){navigator.clipboard.writeText(asmResult.textContent);}
</script>

</body>
</html>
