<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GB解析ツール 完全版</title>

<style>
body{
background:#111;
color:#0f0;
font-family:monospace;
}

.box{
border:1px solid #0f0;
margin:10px;
padding:10px;
}

textarea{
width:95%;
height:100px;
}

input,button,select{
margin:3px;
padding:4px;
}

pre{
white-space:pre-wrap;
text-align:left;
}

#flags{
color:#0ff;
font-weight:bold;
}
</style>
</head>

<body>

<h1>GB解析ツール（完全安定版）</h1>

<!-- ================= 計算 ================= -->
<div class="box">
<h2>16bit計算（フラグ付き）</h2>

<input id="hex1" placeholder="A0">
<input id="hex2" placeholder="10"><br>

<button onclick="add()">+</button>
<button onclick="sub()">-</button>

<p>
結果: <span id="hexResult"></span><br>
フラグ: <span id="flags"></span>
</p>

<h3>履歴</h3>
<div id="history"></div>
<button onclick="copyHistory()">コピー</button>
</div>

<!-- ================= 進数 ================= -->
<div class="box">
<h2>進数変換</h2>

<input id="num">
<select id="base">
<option value="10">10</option>
<option value="16">16</option>
<option value="2">2</option>
</select>

<button onclick="convert()">変換</button>

<p id="out10"></p>
<p id="out16"></p>
<p id="out2"></p>
</div>

<!-- ================= 論理演算 ================= -->
<div class="box">
<h2>論理演算</h2>

<input id="l1">
<input id="l2"><br>

<button onclick="andOp()">AND</button>
<button onclick="orOp()">OR</button>
<button onclick="xorOp()">XOR</button>

<p id="logicOut"></p>
</div>

<!-- ================= 文字変換 ================= -->
<div class="box">
<h2>GB文字変換</h2>

<textarea id="hexText" placeholder="HEX入力"></textarea><br>
<button onclick="hexToText()">HEX→文字</button>

<br><br>

<textarea id="text" placeholder="文字入力"></textarea><br>
<button onclick="textToHex()">文字→HEX（5区切り+50）</button>

<p id="textOut"></p>
<p id="hexOut"></p>
</div>

<!-- ================= 逆アセンブル ================= -->
<div class="box">
<h2>簡易逆アセンブル</h2>

開始アドレス <input id="start" value="4000"><br>
<textarea id="asm"></textarea><br>

<button onclick="disasm()">実行</button>

<pre id="asmOut"></pre>
</div>

<script>

//////////////////////////////////////////////////////
// フラグ
//////////////////////////////////////////////////////
function setFlags(Z,N,H,C){
flags.textContent=`Z:${Z} N:${N} H:${H} C:${C}`;
return {Z,N,H,C};
}

//////////////////////////////////////////////////////
// 履歴
//////////////////////////////////////////////////////
let hist=[];
function addHist(t){
hist.push(t);
history.innerHTML=hist.join("<br>");
}
function copyHistory(){
navigator.clipboard.writeText(hist.join("\n"));
}

//////////////////////////////////////////////////////
// 計算
//////////////////////////////////////////////////////
function add(){
let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;

let r=a+b;
let w=r&0xFF;

let f=setFlags(
w==0,
0,
((a&0xF)+(b&0xF)>0xF),
r>0xFF
);

hexResult.textContent=w.toString(16).toUpperCase();
addHist(`${hex1.value}+${hex2.value}=${w.toString(16)} Z:${f.Z} N:${f.N} H:${f.H} C:${f.C}`);
}

function sub(){
let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;

let r=a-b;
let w=r&0xFF;

let f=setFlags(
w==0,
1,
(a&0xF)<(b&0xF),
a<b
);

hexResult.textContent=w.toString(16).toUpperCase();
addHist(`${hex1.value}-${hex2.value}=${w.toString(16)} Z:${f.Z} N:${f.N} H:${f.H} C:${f.C}`);
}

//////////////////////////////////////////////////////
// 進数変換
//////////////////////////////////////////////////////
function convert(){
let v=parseInt(num.value,parseInt(base.value))||0;

out10.textContent="10:"+v;
out16.textContent="16:"+v.toString(16).toUpperCase();
out2.textContent="2:"+v.toString(2);
}

//////////////////////////////////////////////////////
// 論理演算
//////////////////////////////////////////////////////
function andOp(){
logicOut.textContent=(parseInt(l1.value,16)&parseInt(l2.value,16)).toString(16);
}
function orOp(){
logicOut.textContent=(parseInt(l1.value,16)|parseInt(l2.value,16)).toString(16);
}
function xorOp(){
logicOut.textContent=(parseInt(l1.value,16)^parseInt(l2.value,16)).toString(16);
}

//////////////////////////////////////////////////////
// 文字テーブル（完全修正版）
//////////////////////////////////////////////////////
const table={
"00":"-","01":"イ゛","02":"ウ゛","03":"エ゛","04":"オ゛",

"05":"ガ","06":"ギ","07":"グ","08":"ゲ","09":"ゴ",
"0A":"ザ","0B":"ジ","0C":"ズ","0D":"ゼ","0E":"ゾ",

"0F":"ダ","10":"ヂ","11":"ヅ","12":"デ","13":"ド",

"14":"ナ゛","15":"ニ゛","16":"ヌ゛","17":"ネ゛","18":"ノ゛",

"19":"バ","1A":"ビ","1B":"ブ","1C":"ボ",

"1D":"マ゛","1E":"ミ゛","1F":"ム゛",

"20":"ィ゛","21":"あ゛","22":"い゛","23":"?","24":"え゛","25":"お゛",

"26":"が","27":"ぎ","28":"ぐ","29":"げ","2A":"ご",
"2B":"ざ","2C":"じ","2D":"ず","2E":"ぜ","2F":"ぞ",

"30":"だ","31":"ぢ","32":"づ","33":"で","34":"ど",

"35":"な゛","36":"に゛","37":"ぬ゛","38":"ね゛","39":"の゛",

"3A":"ば","3B":"び","3C":"ぶ","3D":"べ","3E":"ぼ",

"3F":"ま゛","40":"パ","41":"ピ","42":"プ","43":"ポ",

"44":"ぱ","45":"ぴ","46":"ぷ","47":"ぺ","48":"ぽ",

"49":"ま゜","4A":"み゜",

"4B":"[送]","4C":"[自動]","4D":"も゜",

"4E":"\n","4F":"\n","50":"[END]",

"60":"A","61":"B","62":"C",

"85":"カ","86":"キ","87":"ク","88":"ケ","89":"コ",
"8A":"サ","8B":"シ","8C":"ス","8D":"セ","8E":"ソ",

"8F":"タ","90":"チ","91":"ツ","92":"テ","93":"ト",

"94":"ナ","95":"ニ","96":"ヌ","97":"ネ","98":"ノ",
"99":"ハ","9A":"ヒ","9B":"フ","9C":"ホ",

"9D":"マ","9E":"ミ","9F":"ム","A0":"メ","A1":"モ",

"A2":"ヤ","A3":"ユ","A4":"ヨ",
"A5":"ラ","A6":"ル","A7":"レ","A8":"ロ",

"A9":"ワ","AA":"ヲ","AB":"ン",

"AC":"ッ","AD":"ャ","AE":"ュ","AF":"ョ",

"B0":"ィ","B1":"あ","B2":"い","B3":"う","B4":"え","B5":"お",

"B6":"か","B7":"き","B8":"く","B9":"け","BA":"こ",

"BB":"さ","BC":"し","BD":"す","BE":"せ","BF":"そ",

"C0":"た","C1":"ち","C2":"つ","C3":"て","C4":"と",

"C5":"な","C6":"に","C7":"ぬ","C8":"ね","C9":"の",

"CA":"は","CB":"ひ","CC":"ふ","CD":"へ","CE":"ほ",

"CF":"ま","D0":"み","D1":"む","D2":"め","D3":"も",

"D4":"や","D5":"ゆ","D6":"よ",

"D7":"ら","D8":"り","D9":"る","DA":"れ","DB":"ろ",

"DC":"わ","DD":"を","DE":"ん",

"DF":"っ","E0":"ゃ","E1":"ゅ","E2":"ょ",

"E3":"ー","E4":"ﾟ","E5":"゛",

"E6":"？","E7":"！","E8":"。",
"E9":"ァ","EA":"ゥ","EB":"ェ","EC":"ォ",

"ED":"[改行]","EE":"[改頁]","EF":"▼",

"F0":"円","F1":"×","F2":"．","F3":"／",

"F4":"♂","F5":"♀",

"F6":"0","F7":"1","F8":"2","F9":"3",
"FA":"4","FB":"5","FC":"6","FD":"7","FE":"8","FF":"9"
};

//////////////////////////////////////////////////////
// reverse（安全版）
//////////////////////////////////////////////////////
const rev={};

for(let k in table){
let v=table[k];
if(v.startsWith("[") || v=="\n") continue;
rev[v]=k;
}

//////////////////////////////////////////////////////
// HEX→文字
//////////////////////////////////////////////////////
function hexToText(){
let c=hexText.value.replace(/[^0-9A-F]/gi,"");
let r="";

for(let i=0;i<c.length;i+=2){
let h=c.substr(i,2).toUpperCase();
r+=table[h]||"?";
}

textOut.textContent=r;
}

//////////////////////////////////////////////////////
// 文字→HEX（5区切り+50）
//////////////////////////////////////////////////////
function textToHex(){

let t=text.value;

let out=[];
let buf=[];

for(let ch of t){

if(/[①-⑳]/.test(ch)) continue;

let c=rev[ch];

if(!c){
console.warn("未定義:",ch);
c="50";
}

buf.push(c);

if(buf.length==5){
out.push(...buf,"50");
buf=[];
}
}

while(buf.length<5)buf.push("50");
out.push(...buf,"50");

hexOut.textContent=out.join(" ");
}

//////////////////////////////////////////////////////
// 逆アセンブル（簡易）
//////////////////////////////////////////////////////
function disasm(){

let b=asm.value.replace(/[^0-9A-F]/gi,"");
let addr=parseInt(start.value,16)||0;

let i=0,res="";

while(i<b.length){

let op=b.substr(i,2);
let line="???";
let size=1;

if(op=="3E"){line="ld a,"+b.substr(i+2,2);size=2;}
else if(op=="06"){line="ld b,"+b.substr(i+2,2);size=2;}
else if(op=="C3"){line="jp "+b.substr(i+4,2)+b.substr(i+2,2);size=3;}
else if(op=="CD"){line="call";size=3;}
else if(op=="C9"){line="ret";size=1;}
else if(op=="18"){line="jr";size=2;}

res+=addr.toString(16).padStart(4,"0")+": "+op+" "+line+"\n";

i+=size*2;
addr+=size;
}

asmOut.textContent=res;
}

</script>

</body>
</html>
