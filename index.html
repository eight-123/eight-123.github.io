<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GB解析ツール</title>

<style>
body{
background:#111;
color:#0f0;
font-family:monospace;
}
.box{
border:1px solid #0f0;
margin:10px;
padding:10px;
}
textarea{
width:95%;
height:100px;
}
input,button,select{
margin:3px;
padding:4px;
}
#flags{
color:#0ff;
font-weight:bold;
}
</style>
</head>

<body>
<div class="box">
<h2>逆アセンブル</h2>

<textarea id="disInput" placeholder="例: 3E 10 06 20"></textarea><br>

開始アドレス:
<input id="startAddr" value="0000">

<button onclick="disassemble()">実行</button>

<pre id="disOut"></pre>
</div>
<h1>GB解析ツール</h1>

<!-- 計算 -->
<div class="box">
<h2>16bit計算（フラグ付き）</h2>

<input id="hex1" placeholder="A0">
<input id="hex2" placeholder="10"><br>

<button onclick="add()">+</button>
<button onclick="sub()">-</button>

<p>
結果: <span id="hexResult"></span><br>
フラグ: <span id="flags"></span>
</p>

<h3>履歴</h3>
<div id="history"></div>
<button onclick="copyHistory()">コピー</button>
</div>

<!-- 進数 -->
<div class="box">
<h2>進数変換</h2>

<input id="num">
<select id="base">
<option value="10">10</option>
<option value="16">16</option>
<option value="2">2</option>
</select>

<button onclick="convert()">変換</button>

<p id="out10"></p>
<p id="out16"></p>
<p id="out2"></p>
</div>

<!-- 論理演算 -->
<div class="box">
<h2>論理演算</h2>

<input id="l1">
<input id="l2"><br>

<button onclick="andOp()">AND</button>
<button onclick="orOp()">OR</button>
<button onclick="xorOp()">XOR</button>

<p id="logicOut"></p>
</div>

<!-- 文字変換 -->
<div class="box">
<h2>GB文字変換</h2>

<textarea id="hexText"></textarea><br>
<!-- HEX→文字の設定 -->
<select id="undefMode">
  <option value="keep">未定義をそのまま表示</option>
  <option value="remove">未定義を削除</option>
</select>
  
<button onclick="hexToText()">HEX→文字</button>

<br><br>

<textarea id="text"></textarea><br>
<button onclick="textToHex()">文字→HEX</button>

<p id="textOut"></p>
<p id="hexOut"></p>
</div>

<script src="opcodes.js"></script>
<script src="opcodes_cb.js"></script>
<script src="text_table.js"></script>

<script>

// フラグ
function setFlags(Z,N,H,C){
flags.textContent=`Z:${Z} N:${N} H:${H} C:${C}`;
return {Z,N,H,C};
}

// 履歴
let hist=[];
function addHist(t){
hist.push(t);
history.innerHTML=hist.join("<br>");
}
function copyHistory(){
navigator.clipboard.writeText(hist.join("\n"));
}

// 計算
function add(){
let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;
let r=a+b;
let w=r&0xFF;

let f=setFlags(w==0,0,((a&0xF)+(b&0xF)>0xF),r>0xFF);

hexResult.textContent=w.toString(16).toUpperCase();
addHist(`${hex1.value}+${hex2.value}=${w.toString(16)}`);
}

function sub(){
let a=parseInt(hex1.value,16)||0;
let b=parseInt(hex2.value,16)||0;
let r=a-b;
let w=r&0xFF;

let f=setFlags(w==0,1,(a&0xF)<(b&0xF),a<b);

hexResult.textContent=w.toString(16).toUpperCase();
addHist(`${hex1.value}-${hex2.value}=${w.toString(16)}`);
}

// 進数変換
function convert(){
let v=parseInt(num.value,parseInt(base.value))||0;
out10.textContent="10:"+v;
out16.textContent="16:"+v.toString(16).toUpperCase();
out2.textContent="2:"+v.toString(2);
}

// 論理演算
function andOp(){
logicOut.textContent=(parseInt(l1.value,16)&parseInt(l2.value,16)).toString(16);
}
function orOp(){
logicOut.textContent=(parseInt(l1.value,16)|parseInt(l2.value,16)).toString(16);
}
function xorOp(){
logicOut.textContent=(parseInt(l1.value,16)^parseInt(l2.value,16)).toString(16);
}

// 文字テーブル（そのまま）
const table = window.GB_TEXT;
// reverse
const rev={};
for(let k in table){
let v=table[k];
if(v.startsWith("[") || v=="\n") continue;
rev[v]=k;
}

// HEX→文字
function hexToText(){
  let arr = hexText.value.trim().split(/\s+/);
  let mode = undefMode.value;

  let r = "";

  for(let h of arr){
    h = h.toUpperCase();

    if(table[h]){
      r += table[h];
    } else {
      if(mode === "keep"){
        r += h;   // 未定義をそのまま残す
      }
      // removeなら何も追加しない（スキップ）
    }
  }

  textOut.textContent = r;
}

// 文字→HEX
function textToHex(){
let t = text.value;
  t = t.replaceAll("終", "");
let out = [];

let count = 0;

for(let i=0;i<t.length;i++){

  // ===== 改行 =====
  if(t[i] === "\n"){

  // 5文字未満だけ埋める
  if(count > 0){
    while(count < 5){
      out.push("50");
      count++;
    }
  }

  // ★ここが重要
  if(out[out.length-1] !== "50"){
    out.push("50");
  }

  count = 0;
  continue;
}

  let found = false;

  for(let k in table){
    let v = table[k];
    if(!v) continue;

    if(t.startsWith(v, i)){
      out.push(k);
      i += v.length - 1;
      count++;
      found = true;
      break;
    }
  }

  // ===== 未定義文字 =====
  if(!found){
    out.push(t[i]);   // ←そのまま出す
    continue;         // ←カウントしない
  }

  // ===== 5文字 =====
  if(count === 5){
    out.push("50");
    count = 0;
  }
}

// ===== 最後の行 =====
if(count > 0){
  while(count < 5){
    out.push("50");
    count++;
  }
  out.push("50");
}

hexOut.textContent = out.join(" ");
}
// ===== 逆アセンブル用 =====

// 命令テーブル
const OPC = window.OPCODES;
const CB  = window.OPCODES_CB;

// hex表示
function hex(v,d){
return v.toString(16).toUpperCase().padStart(d,"0");
}

// 逆アセンブル本体
function disassemble(){

let raw = disInput.value.replace(/[^0-9A-F]/gi,"");
let bytes=[];
for(let i=0;i<raw.length;i+=2){
  bytes.push(parseInt(raw.substr(i,2),16));
}

let start = parseInt(startAddr.value,16)||0;

// ===== 1パス目：ジャンプ先収集 =====
let labels={};
let pc=start;
let i=0;

while(i<bytes.length){
  let op=bytes[i];

  if(op===0x18||op===0x20||op===0x28){
  let offset = bytes[i+1] < 0x80 ? bytes[i+1] : bytes[i+1] - 0x100;
  let target = pc + 2 + offset;
  labels[target]=true;
  i+=2; pc+=2;
  continue;
}

  if(op===0xC3||op===0xCD){
    let lo=bytes[i+1];
    let hi=bytes[i+2];
    let addr=(hi<<8)|lo;
    labels[addr]=true;
    i+=3; pc+=3;
    continue;
  }

  let def = OPC[op];
  let size=def?def.s:1;
  i+=size;
  pc+=size;
}

// ラベル名生成
let labelNames={};
let id=0;
for(let addr in labels){
  let a = parseInt(addr);
  labelNames[a] = hex(a,4);
}
// ===== 2パス目 =====
pc=start;
i=0;
let out=[];

while(i < bytes.length){

  let line = "";

  let op = bytes[i];
  let def = OPC[op];

  // サイズ確定（安全版）
  let size = def ? def.s : 1;

  // ラベル
  if(labelNames[pc]){
    line += labelNames[pc] + ": ";
  }

  if(op === 0xCB){
    let cb = bytes[i+1];
    let name = CB[cb] || "???";

    out.push(line + `${hex(pc,4)}: CB ${hex(cb,2)}  ${name}`);

    i += 2;
    pc += 2;
    continue;
  }

  if(!def){
    out.push(line + `${hex(pc,4)}: ${hex(op,2)}  ???`);
    i += 1;
    pc += 1;
    continue;
  }

  let inst = bytes.slice(i, i + size);
  let text = def.m;

  if(size === 2){
    let d = inst[1];

    if(text.includes("r8")){
      let offset = d < 0x80 ? d : d - 0x100;
      let target = (pc + 2 + offset) & 0xFFFF;
      let label = labelNames[target] || hex(target,4);
      text = text.replace("r8", label);
    } else {
      text = text.replace("d8", hex(d,2))
                 .replace("a8", hex(d,2));
    }
  }

  if(size === 3){
    let lo = inst[1];
    let hi = inst[2];
    let addr = (hi << 8) | lo;

    text = text.replace("a16", labelNames[addr] || hex(addr,4));
  }

  out.push(
    line +
    `${hex(pc,4)}: ${inst.map(b=>hex(b,2)).join(" ")}  ${text}`
  );

   i += size;
  pc += size;
}

disOut.textContent = out.join("\n");
}
</script>

</body>
</html>
