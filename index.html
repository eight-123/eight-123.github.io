<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GB計算＆進数変換ツール</title>

<style>
body {
  background: #111;
  color: #0f0;
  font-family: monospace;
  text-align: center;
}

input, button, select {
  margin: 5px;
  padding: 8px;
  font-size: 16px;
}

.box {
  margin: 20px;
  padding: 15px;
  border: 1px solid #0f0;
}
</style>
</head>

<body>

<h1>GB計算＆進数変換ツール</h1>

<!-- 16進数計算 -->
<div class="box">
  <h2>16進数計算（8bit）</h2>
  <input id="hex1" placeholder="例: F0">
  <input id="hex2" placeholder="例: 48">
  <br>
  <button onclick="add()">+</button>
  <button onclick="sub()">-</button>
  <p id="hexResult"></p>
</div>

<!-- 論理演算 -->
<div class="box">
  <h2>論理演算（8bit）</h2>
  <input id="logic1" placeholder="例: F0">
  <input id="logic2" placeholder="例: 0F">
  <br>
  <button onclick="andOp()">AND</button>
  <button onclick="orOp()">OR</button>
  <button onclick="xorOp()">XOR</button>
  <p id="logicResult"></p>
</div>

<!-- 進数変換 -->
<div class="box">
  <h2>進数変換</h2>
  <input id="inputValue" placeholder="値を入力">
  <br>
  <select id="base">
    <option value="10">10進数</option>
    <option value="16">16進数</option>
    <option value="2">2進数</option>
  </select>
  <br>
  <button onclick="convert()">変換</button>

  <p id="bin"></p>
  <p id="dec"></p>
  <p id="hex"></p>
</div>

<!-- フラグ表示 -->
<div class="box">
  <h2>フラグ</h2>
  <p id="flags">Z:0 N:0 H:0 C:0</p>
</div>

<script>
// ===== 共通 =====
function wrap(v) {
  return v & 0xFF;
}

function showFlags(Z, N, H, C) {
  document.getElementById("flags").textContent =
    "Z:" + Z + " N:" + N + " H:" + H + " C:" + C;
}

// ===== 16進数計算 =====
function add() {
  let a = parseInt(document.getElementById("hex1").value, 16);
  let b = parseInt(document.getElementById("hex2").value, 16);

  if (isNaN(a) || isNaN(b)) return alert("入力が不正");

  let result = a + b;

  let Z = ((result & 0xFF) === 0) ? 1 : 0;
  let N = 0;
  let H = (((a & 0xF) + (b & 0xF)) > 0xF) ? 1 : 0;
  let C = (result > 0xFF) ? 1 : 0;

  result = wrap(result);

  document.getElementById("hexResult").textContent =
    "結果: " + result.toString(16).toUpperCase();

  showFlags(Z, N, H, C);
}

function sub() {
  let a = parseInt(document.getElementById("hex1").value, 16);
  let b = parseInt(document.getElementById("hex2").value, 16);

  if (isNaN(a) || isNaN(b)) return alert("入力が不正");

  let result = a - b;

  let Z = ((result & 0xFF) === 0) ? 1 : 0;
  let N = 1;
  let H = ((a & 0xF) < (b & 0xF)) ? 1 : 0;
  let C = (a < b) ? 1 : 0;

  result = wrap(result);

  document.getElementById("hexResult").textContent =
    "結果: " + result.toString(16).toUpperCase();

  showFlags(Z, N, H, C);
}

// ===== 論理演算 =====
function logicPrep() {
  let a = parseInt(document.getElementById("logic1").value, 16);
  let b = parseInt(document.getElementById("logic2").value, 16);

  if (isNaN(a) || isNaN(b)) {
    alert("入力が不正");
    return null;
  }

  return [wrap(a), wrap(b)];
}

function showResult(result) {
  document.getElementById("logicResult").textContent =
    "結果: " + result.toString(16).toUpperCase();
}

function andOp() {
  let vals = logicPrep();
  if (!vals) return;
  let [a, b] = vals;

  let result = a & b;

  showResult(result);
  showFlags(result === 0 ? 1 : 0, 0, 1, 0);
}

function orOp() {
  let vals = logicPrep();
  if (!vals) return;
  let [a, b] = vals;

  let result = a | b;

  showResult(result);
  showFlags(result === 0 ? 1 : 0, 0, 0, 0);
}

function xorOp() {
  let vals = logicPrep();
  if (!vals) return;
  let [a, b] = vals;

  let result = a ^ b;

  showResult(result);
  showFlags(result === 0 ? 1 : 0, 0, 0, 0);
}

// ===== 進数変換 =====
function convert() {
  let val = document.getElementById("inputValue").value.trim();
  let base = Number(document.getElementById("base").value);

  let num = parseInt(val, base);

  if (isNaN(num)) return alert("入力が不正");

  document.getElementById("bin").textContent =
    "2進数: " + num.toString(2);

  document.getElementById("dec").textContent =
    "10進数: " + num;

  document.getElementById("hex").textContent =
    "16進数: " + num.toString(16).toUpperCase();
}
</script>

</body>
</html>
